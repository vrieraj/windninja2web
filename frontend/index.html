<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindNinja Web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="/static/css/style.css?v=12">
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h2>WindNinja</h2>
            <div id="meteo-panels"></div>
            <div id="export-controls"></div>
        </div>
        <div id="viewer">
            <div id="viewer-2d"></div>
            <div id="viewer-3d" style="display:none;position:relative;width:100%;height:100%;">
                <div id="viewer-3d-controls" style="position:absolute;top:10px;left:10px;z-index:1000;display:flex;gap:4px;">
                    <button class="leaflet-btn" onclick="window.show2DView()">← Mapa 2D</button>
                    <button class="leaflet-btn" onclick="window.changeLayer('satellite')">Satélite</button>
                    <button class="leaflet-btn" onclick="window.changeLayer('standard')">Estándar</button>
                    <button class="leaflet-btn" onclick="window.changeLayer('hybrid')">Híbrido</button>
                </div>
            </div>
            <div id="viewer-geojson-input" style="display:none;">
                <input type="file" id="geojson-file-input" accept=".geojson,.json,.kml,.kmz" />
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="/static/js/app.js?v=12"></script>
    <script type="module" src="/static/js/viewer.js?v=12"></script>
    <script src="/static/js/sidebar.js?v=12"></script>
    <script src="/static/js/simulation.js?v=12"></script>
    <script src="/static/js/export.js?v=12"></script>
</body>
</html>
