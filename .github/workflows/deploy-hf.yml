name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  HF_SPACE: ${{ vars.HF_USER || 'vrieraj' }}/${{ vars.HF_SPACE || 'windninja2web' }}

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Hugging Face Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.huggingface.co
          username: ${{ github.actor }}
          password: ${{ secrets.HF_TOKEN }}

      - name: Build and push to HF
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: registry.huggingface.co/${{ env.HF_SPACE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
